name: secret-scan

# Runs on every push and PR, regardless of where the push originated from
# (local git, GitHub web UI, a third-party integration) — the point is to
# catch anything that slips past the local pre-push hook.
on:
  push:
  pull_request:

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
